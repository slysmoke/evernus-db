# This is a basic workflow to help you get started with Actions

name: eve.db cleaner

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    

    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}


      # Runs a single command using the runners shell
    - name: Download db from fuzzworks
      run: wget https://www.fuzzwork.co.uk/dump/sqlite-latest.sqlite.bz2
      
       # Runs a single command using the runners shell
    - name: Decompress db
      run: bzip2 -d sqlite-latest.sqlite.bz2
        
        # Runs a single command using the runners shell
    - name: Patch db
      run: ./update_sde.sh sqlite-latest.sqlite eve.db
      shell: bash
        


      # Runs a set of commands using the runners shell
    - name: Run a multi-line script
      run: |
        rm -rf sqlite-latest.sqlite,
        rm -rf sqlite-latest.sqlite.bz


    - name: Commit build artifacts 
      # Don't run again on already pushed auto commit. Don't run on pull request events.
      
      run: |
        git config --global user.name "${{ secrets.USER_NAME }}"
        git config --global user.email "${{ secrets.USER_EMAIL }}"
        git commit -a -m "Automated database update"
        git push
